<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACN Bank Chat</title>
  <script defer
    src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js">
  </script>
  <link
    rel="stylesheet"
    href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css"
  >
  <link
    rel="stylesheet"
    href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css"
  >
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    body {
      overflow: auto;
    }
    chat-messenger {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      --chat-messenger-width: 100vw;
      --chat-messenger-height: 100vh;
    }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const kycRequestId = params.get("kyc_request_id");
    const customerDocId = params.get("customer_doc_id");

    console.log("KYC URL params:", {
      kyc_request_id: kycRequestId,
      customer_doc_id: customerDocId
    });

    window.addEventListener("chat-messenger-loaded", () => {
      console.log("chatSdk keys:", Object.keys(chatSdk));

      const contextConfig = {
        deploymentName:
          "projects/483471568825/locations/us/apps/d61ad730-4835-43e8-93d5-3159bb492e08/deployments/bf58b863-2526-48c2-bb6e-03d9613527f7",
        enableWelcomeEvent: !kycRequestId,
        tokenBroker: {
          enableTokenBroker: true,
          enableRecaptcha: false
        }
      };

      if (kycRequestId) {
        contextConfig.sessionId = "kyc-" + kycRequestId;
      }

      console.log("CES context config:", contextConfig);
      chatSdk.registerContext(
        chatSdk.prebuilts.ces.createContext(contextConfig)
      );

      // KYC session: inject bootstrap message into the widget input via Shadow DOM
      if (kycRequestId) {
        const kycPayload = customerDocId
          ? `continue_kyc_upload:${kycRequestId}:${customerDocId}`
          : `continue_kyc_upload:${kycRequestId}`;

        console.log("KYC payload to inject:", kycPayload);

        const tryInject = (attempts = 0) => {
          // The SDK uses Shadow DOM — we need to pierce it
          const host = document.querySelector("chat-messenger");
          const shadow = host?.shadowRoot;

          // Try multiple possible input selectors inside the shadow tree
          const input = shadow?.querySelector("input[type=text], textarea, input:not([type=hidden])");
          const sendBtn = shadow?.querySelector(
            "button[aria-label='Send message'], button[type=submit], button.send-button"
          );

          console.log(`Inject attempt ${attempts}: input=${!!input} sendBtn=${!!sendBtn}`);

          if (input && sendBtn) {
            // React/lit-style value setter to trigger framework listeners
            const nativeSetter = Object.getOwnPropertyDescriptor(
              window.HTMLInputElement.prototype, "value"
            ).set;
            nativeSetter.call(input, kycPayload);
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.dispatchEvent(new Event("change", { bubbles: true }));
            setTimeout(() => {
              sendBtn.click();
              console.log("KYC bootstrap message sent.");
            }, 150);
          } else if (attempts < 20) {
            // Retry every 300ms for up to 6 seconds
            setTimeout(() => tryInject(attempts + 1), 300);
          } else {
            console.warn("Could not find chat input after 20 attempts.");
          }
        };

        // Give the widget time to render before first attempt
        setTimeout(() => tryInject(), 800);
      }
    });
  </script>

  <chat-messenger url-allowlist="*">
    <chat-messenger-container
      chat-title="ACN Bank"
      chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
      enable-file-upload
      enable-audio-input
    >
      <chat-reset-session-button
        slot="titlebar-actions"
        title-text="Start new chat"
      ></chat-reset-session-button>
      <chat-toggle-dialog-button
        slot="titlebar-actions"
        title-text-expanded="Collapse"
        title-text-collapsed="Expand"
      ></chat-toggle-dialog-button>
      <chat-messenger-close-button
        slot="titlebar-actions"
        title-text="Close"
      ></chat-messenger-close-button>
    </chat-messenger-container>
  </chat-messenger>
</body>
</html>
