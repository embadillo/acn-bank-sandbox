<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACN Bank - Secure KYC Upload Portal</title>
    
    <!-- Archivos obligatorios del SDK de Google Conversational Agents (CES) v1.16 -->
    <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .loading-container {
            text-align: center;
            color: #333;
            max-width: 400px;
            padding: 20px;
        }

        /* Forzamos a que el widget se posicione correctamente en la UI */
        chat-messenger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <h2>Connecting to ACN Bank secure channel...</h2>
        <p>Please wait while we transfer your verification session.</p>
    </div>

    <!-- Tu componente nativo de Google Cloud -->
    <chat-messenger url-allowlist="*">
      <chat-messenger-container
        chat-title="ACN Bank"
        chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
        enable-file-upload
        enable-audio-input
      >
        <chat-reset-session-button slot="titlebar-actions" title-text="Start new chat"></chat-reset-session-button>
        <chat-toggle-dialog-button slot="titlebar-actions" title-text-expanded="Collapse" title-text-collapsed="Expand"></chat-toggle-dialog-button>
        <chat-messenger-close-button slot="titlebar-actions" title-text="Close"></chat-messenger-close-button>
      </chat-messenger-container>
    </chat-messenger>

    <script>
        // 1. Parsear parámetros KYC desde la URL actual
        const urlParams = new URLSearchParams(window.location.search);
        const kycRequestId = urlParams.get('kyc_request_id');
        const customerDocId = urlParams.get('customer_doc_id');

        console.log("=== KYC Parameters Detected ===");
        console.log("KYC Request ID:", kycRequestId);
        console.log("Customer Doc ID:", customerDocId);

        // 2. Esperar a que el script de Google esté listo en el DOM
        window.addEventListener("chat-messenger-loaded", () => {
            console.log("Google Chat SDK successfully initialized.");

            // Inicializamos el contexto oficial de tu agente en GCP
            chatSdk.registerContext(
                chatSdk.prebuilts.ces.createContext({
                    deploymentName: "projects/483471568825/locations/us/apps/d61ad730-4835-43e8-93d5-3159bb492e08/deployments/bf58b863-2526-48c2-bb6e-03d9613527f7",
                    tokenBroker: {
                        enableTokenBroker: true,
                        enableRecaptcha: false
                    }
                }),
            );

            // 3. Si los datos existen, abrimos e inyectamos de forma transparente
            if (kycRequestId && customerDocId) {
                setTimeout(() => {
                    const kycPayload = `continue_kyc_upload:${kycRequestId}:${customerDocId}`;
                    console.log("Attempting payload injection:", kycPayload);

                    const chatEl = document.querySelector('chat-messenger');

                    // === PASO A: Forzar apertura visual del Chat ===
                    if (chatEl) {
                        if (typeof chatEl.openChat === 'function') {
                            chatEl.openChat();
                            console.log("Chat window expanded via openChat().");
                        } else if (typeof chatEl.expandChatWindow === 'function') {
                            chatEl.expandChatWindow();
                            console.log("Chat window expanded via expandChatWindow().");
                        } else {
                            // Alternativa por atributo HTML directo si los métodos JS fallan
                            chatEl.setAttribute('open', 'true');
                            console.log("Chat window expanded via 'open' attribute.");
                        }
                    }

                    // === PASO B: Envío dinámico del Payload (Priorizando el método validado) ===
                    if (chatEl && typeof chatEl.sendQuery === 'function') {
                        chatEl.sendQuery(kycPayload);
                        console.log("Payload sent via chatEl.sendQuery!");
                    }
                    else if (chatEl && typeof chatEl.sendMessage === 'function') {
                        chatEl.sendMessage({ text: kycPayload });
                        console.log("Payload sent via chatEl.sendMessage!");
                    } 
                    else if (typeof chatSdk.sendRequest === 'function') {
                        chatSdk.sendRequest({ type: 'text', text: kycPayload });
                        console.log("Payload sent via chatSdk.sendRequest!");
                    }
                    else {
                        console.error("Critical: No execution method found for this version of Google CES SDK.");
                    }

                }, 1200); // 1.2 segundos para asegurar el handshake de red del bot
            } else {
                console.warn("No parameters found in URL. Operating in standard user mode.");
            }
        });
    </script>

</body>
</html>
