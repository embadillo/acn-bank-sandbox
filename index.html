<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACN Bank - Secure KYC Upload Portal</title>
    
    <script src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .loading-container {
            text-align: center;
            color: #333;
        }

        /* Estilos personalizados para ajustar la estética de df-messenger si lo deseas */
        df-messenger {
            --df-messenger-brand-color: #004B87; /* Azul corporativo de ACN Bank */
            --df-messenger-font-color: #333;
            --df-messenger-chat-window-height: 80vh;
            --df-messenger-chat-window-width: 450px;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <h2>Conectando con el canal seguro de ACN Bank...</h2>
        <p>Por favor, espera un momento mientras transferimos tu sesión de verificación.</p>
    </div>

    <df-messenger
        chat-title="ACN Bank"
        agent-id="b66d2738-d1cd-4a8c-a503-59e71cf89815" 
        language-code="es"
        df-client-v2="true">
        <df-messenger-chat
            chat-title="ACN Bank Validation">
        </df-messenger-chat>
    </df-messenger>

    <script>
        // 1. Extraemos de forma segura los parámetros desde la URL de la pestaña actual
        const urlParams = new URLSearchParams(window.location.search);
        const kycRequestId = urlParams.get('kyc_request_id');
        const customerDocId = urlParams.get('customer_doc_id');

        console.log("=== Parámetros Detectados ===");
        console.log("KYC Request ID:", kycRequestId);
        console.log("Customer Doc ID:", customerDocId);

        // Solo procedemos si los parámetros obligatorios existen en la URL
        if (kycRequestId && customerDocId) {
            
            // 2. Escuchamos el evento global del SDK que avisa cuando el chat de Google está montado en la página
            window.addEventListener('df-messenger-loaded', () => {
                console.log("Widget 'df-messenger' cargado. Iniciando inyección segura...");

                const dfMessenger = document.querySelector('df-messenger');

                // 3. Pequeño delay de cortesía (500ms) para garantizar el renderizado de las capas del Shadow DOM interno
                setTimeout(() => {
                    // Accedemos al primer nivel del Shadow Root de Google
                    const shadowRoot = dfMessenger.shadowRoot;
                    if (!shadowRoot) {
                        console.error("Error crítico: No se puede acceder al Shadow Root principal de df-messenger.");
                        return;
                    }

                    // Accedemos al segundo nivel (el chat interno oculto)
                    const chatContent = shadowRoot.querySelector('df-messenger-chat');
                    const chatShadowRoot = chatContent ? chatContent.shadowRoot : null;

                    if (chatShadowRoot) {
                        console.log("¡Estructura de Shadow DOM perforada con éxito!");

                        // Armamos el payload con el formato exacto que espera nuestro Lead Orchestrator
                        const kycPayload = `continue_kyc_upload:${kycRequestId}:${customerDocId}`;
                        console.log("Inyectando payload invisible:", kycPayload);

                        // 4. Usamos la API del SDK de Google para enviar la petición directamente al bot
                        // Esto emula un input de usuario de forma limpia y transparente sin tocar la UI
                        dfMessenger.sendRequest({
                            type: 'text',
                            text: kycPayload
                        });

                        console.log("Payload enviado exitosamente al motor de ACN Bank.");

                        // Opcional: Expandir la ventana de chat automáticamente si está colapsada
                        if (typeof dfMessenger.expandChatWindow === 'function') {
                            dfMessenger.expandChatWindow();
                        }

                    } else {
                        console.error("Error crítico: No se encontró la interfaz interna de chat dentro del Shadow DOM.");
                    }
                }, 500);
            });

        } else {
            console.warn("Advertencia: No se detectaron parámetros KYC válidos en la URL. El chat operará en modo estándar.");
        }
    </script>

</body>
</html>
